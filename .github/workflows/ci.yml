name: Playwright CI/CD

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stop old containers
        run: docker compose down || true

      - name: Build and run tests
        run: docker compose up --build --abort-on-container-exit

      # 🔥 ВАЖНЫЙ ФИКС: вытаскиваем отчёт из контейнера на хост
      - name: Copy Allure report from container
        run: |
          mkdir -p reports
          docker cp $(docker ps -alq):/app/reports ./reports || true

      # 🔥 проверка (очень полезно)
      - name: Debug Allure files
        run: ls -R reports || true

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report/

  deploy:
    needs: test
    runs-on: self-hosted
    if: success()

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report