name: Playwright CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: self-hosted

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. gh-pages history
      - name: Checkout gh-pages branch (history)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      # 3. Load history
      - name: Load previous Allure history
        run: |
          mkdir -p reports/allure-history

          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history/* reports/allure-history/ || true
          else
            echo "No history found"
          fi

      # 4. Stop containers
      - name: Stop old containers
        run: docker compose down || true

      # ❗ 5. RUN TESTS (ГАРАНТИРОВАННЫЙ CAPTURE)
      - name: Run tests in Docker
        id: run_tests
        run: |
          set +e

          docker compose up --build --abort-on-container-exit
          EXIT_CODE=$?

          echo "Exit code: $EXIT_CODE"

          # сохраняем результат
          echo "$EXIT_CODE" > exit_code.txt

          exit 0

      # 6. Upload exit code as artifact (важно)
      - name: Save test result
        uses: actions/upload-artifact@v4
        with:
          name: test-result
          path: exit_code.txt

      # 7. Upload report (всегда)
      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report/

  notify:
    needs: test
    runs-on: self-hosted
    if: always()

    steps:
      - name: Download test result
        uses: actions/download-artifact@v4
        with:
          name: test-result

      - name: Read exit code
        id: result
        run: |
          EXIT_CODE=$(cat exit_code.txt)
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

      # 📬 EMAIL ТОЛЬКО ЕСЛИ ТЕСТ УПАЛ
      - name: Send email on failure (SMTP)
        if: steps.result.outputs.exit_code != '0'
        run: |
          sudo apt-get update
          sudo apt-get install -y msmtp

          cat <<EOF > ~/.msmtprc
          defaults
          auth           on
          tls            on
          tls_trust_file /etc/ssl/certs/ca-certificates.crt
          logfile        ~/.msmtp.log

          account gmail
          host smtp.gmail.com
          port 587
          from $EMAIL_USERNAME
          user $EMAIL_USERNAME
          password $EMAIL_PASSWORD

          account default : gmail
          EOF

          chmod 600 ~/.msmtprc

          echo -e "Subject: ❌ Tests FAILED\n\nRepo: ${{ github.repository }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" | msmtp -v $EMAIL_USERNAME

        env:
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}

  deploy:
    needs: test
    runs-on: self-hosted
    if: always()

    steps:
      - name: Download Allure report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy Allure report ${{ github.sha }}'