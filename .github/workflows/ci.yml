name: Playwright CI/CD

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stop old containers
        run: docker compose down || true

      - name: Clean old reports
        run: |
          sudo rm -rf reports
          mkdir -p reports

      - name: Build and run tests
        run: docker compose up --build --abort-on-container-exit
        continue-on-error: true

      - name: Fix file permissions for artifact
        run: |
          # Копируем файлы из контейнера на хост с правильными правами
          docker cp my-tests:/app/reports/allure-report ./reports-allure-backup
          sudo rm -rf reports/allure-report
          sudo mv reports-allure-backup reports/allure-report
          sudo chown -R $(whoami):$(whoami) reports/
          echo "Report files after fix:"
          ls -la reports/allure-report/

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report/
          if-no-files-found: error
          retention-days: 7

  deploy:
    needs: test
    runs-on: self-hosted
    if: always() && !cancelled()

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Verify downloaded artifact
        run: |
          echo "Downloaded files:"
          ls -la allure-report/
          if [ -f "allure-report/index.html" ]; then
            echo "✓ index.html found"
          else
            echo "✗ index.html not found"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'