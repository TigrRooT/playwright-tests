version: "3.9"

services:
  my-tests:
    build: .

    # ВАЖНО: одинаковый UID с runner (обычно 1000)
    user: "1000:1000"

    volumes:
      - .:/app
      - ./reports:/app/reports

    working_dir: /app

    environment:
      - BASE_URL=http://host.docker.internal:8080

    extra_hosts:
      - "host.docker.internal:host-gateway"

    command: ["bash", "./run_tests.sh"]