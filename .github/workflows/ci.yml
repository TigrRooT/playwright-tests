name: Playwright CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stop containers
        run: docker compose down || true

      # 🔥 RUN TESTS
      - name: Run tests
        run: |
          chmod +x run_tests.sh
          ./run_tests.sh

      # 📦 Upload report (НЕ падает если пусто)
      - name: Upload Allure report
        if: always() && hashFiles('reports/allure-report/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report/

      # 📦 Upload exit code (ВАЖНО)
      - name: Upload exit code
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-result
          path: reports/exit_code.txt

  notify:
    needs: test
    runs-on: self-hosted
    if: always()

    steps:
      - name: Download exit code
        uses: actions/download-artifact@v4
        with:
          name: test-result

      - name: Read exit code
        id: status
        run: |
          EXIT_CODE=$(cat exit_code.txt | tr -d '[:space:]')
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "Exit code: $EXIT_CODE"

      # 📬 EMAIL ЕСЛИ ПАДЕНИЕ
      - name: Send email on failure
        if: steps.status.outputs.exit_code != '0'
        run: |
          sudo apt-get update
          sudo apt-get install -y msmtp

          cat <<EOF > ~/.msmtprc
          defaults
          auth           on
          tls            on
          tls_trust_file /etc/ssl/certs/ca-certificates.crt
          logfile        ~/.msmtp.log

          account gmail
          host smtp.gmail.com
          port 587
          from $EMAIL_USERNAME
          user $EMAIL_USERNAME
          password $EMAIL_PASSWORD

          account default : gmail
          EOF

          chmod 600 ~/.msmtprc

          echo -e "Subject: ❌ TESTS FAILED\n\nRepo: ${{ github.repository }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" | msmtp -v $EMAIL_USERNAME

        env:
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}

  deploy:
    needs: test
    runs-on: self-hosted
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report
        continue-on-error: true

      - name: Deploy
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'