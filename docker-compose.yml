services:
  my-tests:
    build: .

    container_name: my-tests

    working_dir: /app

    volumes:
      - .:/app
      - ./reports:/app/reports

    environment:
      BASE_URL: "http://app:8080"

    depends_on:
      - app

    command: ["bash", "./run_tests.sh"]

    # важно для нормальных прав в CI
    user: root


  app:
    image: your-app-image:latest
    container_name: my-app

    ports:
      - "8080:8080"

    restart: unless-stopped

    # если у тебя Python/Node/что угодно — замени команду
    command: ["bash", "-c", "npm start"]