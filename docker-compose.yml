version: "3.9"

services:
  tests:
    build:
      context: .
    container_name: my-tests

    user: "1000:1000"

    volumes:
      - ./reports:/app/reports

    network_mode: host

    dns:
      - 8.8.8.8
      - 1.1.1.1

    
    extra_hosts:
      - "host.docker.internal:host-gateway"