name: Playwright CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: self-hosted

    steps:
      # 1. Основной код
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Забираем gh-pages (где лежит предыдущий отчет)
      - name: Checkout gh-pages branch (history)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      # 3. Загружаем history
      - name: Load previous Allure history
        run: |
          mkdir -p reports/allure-history

          if [ -d "gh-pages/history" ]; then
            echo "📥 Found history in gh-pages/history"
            cp -r gh-pages/history/* reports/allure-history/ || true
            echo "✅ History copied"
          else
            echo "ℹ️ No history found (first run)"
          fi

          echo "📁 Loaded history:"
          ls -la reports/allure-history || echo "empty"

      # 4. Останавливаем старые контейнеры
      - name: Stop old containers
        run: docker compose down || true

      # 5. Запуск тестов
      - name: Build and run tests
        run: docker compose up --build --abort-on-container-exit

      # 6. Проверка истории после генерации
      - name: Debug - Check generated history
        run: |
          echo "📁 reports/allure-report/history:"
          ls -la reports/allure-report/history || echo "❌ no history"

      # 7. Сохраняем history для следующего запуска
      - name: Save new history
        run: |
          mkdir -p history

          if [ -d "reports/allure-report/history" ]; then
            cp -r reports/allure-report/history/* history/
            echo "✅ History prepared for deploy"
          else
            echo "❌ No history generated!"
          fi

          echo "📁 Final history:"
          ls -la history

      # 8. Артефакт отчета
      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report/

  deploy:
    needs: test
    runs-on: self-hosted
    if: success()

    steps:
      # 1. Скачиваем отчет
      - name: Download Allure report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      # 2. Проверяем перед деплоем
      - name: Debug before deploy
        run: |
          echo "📁 Report contents:"
          ls -la allure-report
          echo ""
          echo "📁 History in report:"
          ls -la allure-report/history || echo "❌ no history"

      # 3. Деплой (ВАЖНО: keep_files=true)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy Allure report ${{ github.sha }}'