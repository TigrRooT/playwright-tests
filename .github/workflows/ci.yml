name: Playwright CI/CD

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 👉 Скачиваем историю из предыдущего artifact (не git clone!)
      - name: Download previous Allure history
        uses: actions/download-artifact@v4
        with:
          name: allure-history
          path: reports/allure-history/
        continue-on-error: true

      - name: Prepare allure directory (fallback)
        run: |
          mkdir -p reports/allure-history
          if [ -z "$(ls -A reports/allure-history)" ]; then
            echo "No previous history found, starting fresh"
          else
            echo "Previous history loaded successfully"
          fi

      - name: Stop old containers
        run: docker compose down || true

      - name: Build and run tests
        run: docker compose up --build --abort-on-container-exit

      # 👉 Сохраняем историю из нового отчета для следующего запуска
      - name: Save history for next run
        run: |
          mkdir -p allure-history
          if [ -d "reports/allure-report/history" ]; then
            cp -r reports/allure-report/history/* allure-history/
            echo "History saved for next run"
          fi

      - name: Upload Allure report (для деплоя)
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report/
          retention-days: 7

      - name: Upload Allure history (для следующего запуска)
        uses: actions/upload-artifact@v4
        with:
          name: allure-history
          path: allure-history/
          retention-days: 30

  deploy:
    needs: test
    runs-on: self-hosted
    if: success()

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
          keep_files: false
          