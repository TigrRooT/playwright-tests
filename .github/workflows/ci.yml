name: Playwright CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stop old containers
        run: docker compose down || true

      # ❗ RUN TESTS + корректный capture exit code
      - name: Run tests in Docker
        id: run_tests
        run: |
          set +e

          docker compose up --build --abort-on-container-exit
          EXIT_CODE=$?

          # убираем пробелы и переносы
          EXIT_CODE=$(echo "$EXIT_CODE" | tr -d '[:space:]')

          echo "Raw exit code: $EXIT_CODE"

          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          # НЕ ломаем job, всегда продолжаем pipeline
          exit 0

      # 📦 сохраняем отчет
      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report/

  notify:
    needs: test
    runs-on: self-hosted
    if: always()

    steps:
      - name: Download test result
        uses: actions/download-artifact@v4
        with:
          name: allure-report

      # ❗ читаем exit code правильно
      - name: Read exit code
        id: result
        run: |
          echo "DEBUG raw file:"
          cat exit_code.txt || true

          EXIT_CODE=$(cat exit_code.txt 2>/dev/null | tr -d '[:space:]')

          # если файла нет — считаем успех
          if [ -z "$EXIT_CODE" ]; then
            EXIT_CODE=0
          fi

          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "FINAL EXIT CODE: $EXIT_CODE"

      # 📬 EMAIL если тест упал
      - name: Send email on failure (SMTP)
        if: steps.result.outputs.exit_code != '0'
        run: |
          sudo apt-get update
          sudo apt-get install -y msmtp

          cat <<EOF > ~/.msmtprc
          defaults
          auth           on
          tls            on
          tls_trust_file /etc/ssl/certs/ca-certificates.crt
          logfile        ~/.msmtp.log

          account gmail
          host smtp.gmail.com
          port 587
          from $EMAIL_USERNAME
          user $EMAIL_USERNAME
          password $EMAIL_PASSWORD

          account default : gmail
          EOF

          chmod 600 ~/.msmtprc

          echo -e "Subject: ❌ Tests FAILED\n\nRepo: ${{ github.repository }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" | msmtp -v $EMAIL_USERNAME

        env:
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}

  deploy:
    needs: test
    runs-on: self-hosted
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'