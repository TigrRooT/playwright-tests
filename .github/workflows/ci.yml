name: Playwright CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # для ручного запуска

permissions:
  contents: write

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 👉 Клонируем ТОЛЬКО папку history из gh-pages (быстро и без зависаний)
      - name: Load previous Allure history from gh-pages
        run: |
          mkdir -p reports/allure-history
          
          # Создаём временную папку
          mkdir -p temp-gh-pages
          cd temp-gh-pages
          
          # Инициализируем пустой репозиторий
          git init
          git remote add origin https://github.com/${{ github.repository }}
          
          # Включаем спарс-чекаут (скачиваем только нужные файлы)
          git config core.sparseCheckout true
          echo "allure-report/history/*" >> .git/info/sparse-checkout
          echo "history/*" >> .git/info/sparse-checkout
          
          # Скачиваем только последний коммит ветки gh-pages (без истории)
          git pull --depth=1 origin gh-pages 2>/dev/null || true
          
          # Копируем историю если есть
          if [ -d "allure-report/history" ]; then
            cp -r allure-report/history/* ../reports/allure-history/ 2>/dev/null || true
            echo "✅ History loaded from gh-pages"
          elif [ -d "history" ]; then
            cp -r history/* ../reports/allure-history/ 2>/dev/null || true
            echo "✅ History loaded from gh-pages (root)"
          else
            echo "ℹ️ No existing history found"
          fi
          
          cd ..
          rm -rf temp-gh-pages

      - name: Stop old containers
        run: docker compose down || true

      - name: Build and run tests
        run: docker compose up --build --abort-on-container-exit

      - name: Upload Allure report (для отладки)
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report/
          retention-days: 7

  deploy:
    needs: test
    runs-on: self-hosted
    if: success()

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
          keep_files: false