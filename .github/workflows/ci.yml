name: Playwright CI/CD

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 👉 Загружаем историю предыдущих отчетов (исправлено)
      - name: Load previous Allure history
        run: |
          # Проверяем существует ли ветка gh-pages
          if git ls-remote --heads https://github.com/${{ github.repository }} gh-pages | grep -q gh-pages; then
            echo "Branch gh-pages exists, cloning..."
            git clone --depth=1 --branch gh-pages https://github.com/${{ github.repository }} gh-pages || \
            git clone --branch gh-pages https://github.com/${{ github.repository }} gh-pages || true
          else
            echo "Branch gh-pages does not exist yet, skipping history clone"
          fi
          
          mkdir -p reports/allure-history
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history/* reports/allure-history/ 2>/dev/null || true
            echo "History copied successfully"
          else
            echo "No history found, starting fresh"
          fi

      - name: Stop old containers
        run: docker compose down || true

      - name: Build and run tests
        run: docker compose up --build --abort-on-container-exit

      # 👉 Сохраняем history из нового отчета
      - name: Save history for next run
        run: |
          mkdir -p allure-report/history
          if [ -d "reports/allure-report/history" ]; then
            cp -r reports/allure-report/history/* allure-report/history/ 2>/dev/null || true
            echo "New history saved"
          fi

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report/
          retention-days: 7

  deploy:
    needs: test
    runs-on: self-hosted
    if: success()

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          