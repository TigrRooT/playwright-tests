name: Playwright CI/CD

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 👉 ВРЕМЕННО УДАЛЯЕМ ЭТОТ ШАГ
      # - name: Load previous Allure history
      #   run: ...
      
      # Вместо этого просто создаем пустую папку
      - name: Prepare allure directory
        run: |
          mkdir -p reports/allure-history
          echo "Starting fresh - no previous history"

      - name: Stop old containers
        run: docker compose down || true

      - name: Build and run tests
        run: docker compose up --build --abort-on-container-exit

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report/

  deploy:
    needs: test
    runs-on: self-hosted
    if: success()

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
          keep_files: false
          
          