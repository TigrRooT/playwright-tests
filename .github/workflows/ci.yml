name: Playwright CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: self-hosted

    steps:
      # 1. Основной код
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Забираем gh-pages (где лежит предыдущий отчет)
      - name: Checkout gh-pages branch (history)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      # 3. Загружаем history
      - name: Load previous Allure history
        run: |
          mkdir -p reports/allure-history

          if [ -d "gh-pages/history" ]; then
            echo "Found history in gh-pages/history"
            cp -r gh-pages/history/* reports/allure-history/ || true
          else
            echo "No history found (first run)"
          fi

          ls -la reports/allure-history || true

      # 4. Останавливаем старые контейнеры
      - name: Stop old containers
        run: docker compose down || true

      # ❗ 5. ЗАПУСК ТЕСТОВ (ИСПРАВЛЕНО)
      - name: Build and run tests
        run: |
          docker compose up --build --abort-on-container-exit
          EXIT_CODE=$?
          echo "Exit code: $EXIT_CODE"
          exit $EXIT_CODE

      # 6. Проверка истории после генерации
      - name: Debug - Check generated history
        if: always()
        run: |
          ls -la reports/allure-report/history || echo "no history"

      # 7. Сохранение history
      - name: Save new history
        if: always()
        run: |
          mkdir -p history

          if [ -d "reports/allure-report/history" ]; then
            cp -r reports/allure-report/history/* history/
          else
            echo "No history generated!"
          fi

          ls -la history

      # 8. Upload report (даже если тесты упали)
      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report/

      # ❗ 9. EMAIL ON FAILURE (с debug)
      - name: Send email on failure (SMTP)
        if: failure()
        run: |
          sudo apt-get update
          sudo apt-get install -y msmtp

          cat <<EOF > ~/.msmtprc
          defaults
          auth           on
          tls            on
          tls_trust_file /etc/ssl/certs/ca-certificates.crt
          logfile        ~/.msmtp.log

          account gmail
          host smtp.gmail.com
          port 587
          from $EMAIL_USERNAME
          user $EMAIL_USERNAME
          password $EMAIL_PASSWORD

          account default : gmail
          EOF

          chmod 600 ~/.msmtprc

          echo -e "Subject: ❌ Tests FAILED\n\nТесты упали\nRepo: ${{ github.repository }}\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" | msmtp -v $EMAIL_USERNAME

          echo "==== MSMTP LOG ===="
          cat ~/.msmtp.log || true
        env:
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}

  deploy:
    needs: test
    runs-on: self-hosted
    if: success()

    steps:
      - name: Download Allure report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Debug before deploy
        run: |
          ls -la allure-report
          ls -la allure-report/history || echo "no history"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy Allure report ${{ github.sha }}'