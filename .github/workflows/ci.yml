name: Playwright CI/CD

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 👉 Загружаем историю предыдущих отчетов
      - name: Load previous Allure history
        run: |
          git clone --depth=1 --branch gh-pages https://github.com/${{ github.repository }} gh-pages || true
          mkdir -p reports/allure-history
          cp -r gh-pages/history/* reports/allure-history/ 2>/dev/null || true

      - name: Stop old containers
        run: docker compose down || true

      - name: Build and run tests
        run: docker compose up --build --abort-on-container-exit

      # 👉 Сохраняем history из нового отчета
      - name: Save history for next run
        run: |
          mkdir -p allure-report/history
          cp -r reports/allure-report/history/* allure-report/history/ 2>/dev/null || true

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report/

  deploy:
    needs: test
    runs-on: self-hosted
    if: success()

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report