services:
  app:
    image: node:20-alpine

    container_name: my-app

    working_dir: /app

    volumes:
      - ./app:/app

    ports:
      - "8080:8080"

    restart: unless-stopped

    command: ["npm", "start"]

    networks:
      - test-net


  my-tests:
    build: .

    container_name: my-tests

    working_dir: /app

    volumes:
      - .:/app
      - ./reports:/app/reports

    environment:
      BASE_URL: "http://app:8080"
      PYTHONUNBUFFERED: 1

    depends_on:
      - app

    user: root

    networks:
      - test-net

    command: ["bash", "./run_tests.sh"]


networks:
  test-net:
    driver: bridge